<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Image Inspector</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>AI Image Inspector</h1>
        <div class="model-status">
            <i class="fas fa-circle-notch fa-spin"></i>
            <span>Loading AI models...</span>
        </div>

        <div class="upload-zone" id="dropZone">
            <i class="fas fa-cloud-upload-alt fa-3x" style="color: #cbd5e1;"></i>
            <p>Drag & drop image or click to upload</p>
            <input type="file" id="imageUpload" accept="image/*" hidden>
        </div>

        <div class="preview-container">
            <img id="preview">
        </div>

        <div class="actions">
            <button id="describe-btn" class="action-btn">Describe Image</button>
            <button id="classify-btn" class="action-btn">Classify Image</button>
        </div>

        <div class="results-container">
            <div class="result-box">
                <h2>Image Description</h2>
                <div id="description-result" class="result-content"></div>
            </div>
            <div class="result-box">
                <h2>Image Classification</h2>
                <div id="classification-result" class="result-content"></div>
            </div>
        </div>

        <div class="zero-shot-container">
            <h2>Zero-Shot Classification</h2>
            <input type="text" class="label-input"
                   placeholder="Enter comma-separated labels (e.g., cat, dog, car)"
                   value="cat, dog, car, bird, airplane, horse">
            <div class="results">
                <div class="progress-bar">
                    <div class="progress" style="width: 0%"></div>
                </div>
                <div id="result"></div>
                <div class="confidence-meter"></div>
            </div>
        </div>
    </div>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Include your JavaScript file -->
    <script type="module" src="script.js"></script>
</body>
</html>
